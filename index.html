<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Football Shirts Gallery | Premium Collection 2024</title>
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1 class="hero-title">Football Shirts Gallery</h1>
            <p class="hero-subtitle">Premium Collection 2025/26 Season</p>
            <div class="hero-divider"></div>
        </div>
    </header>


    <section class="filter-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="filter-container">
                        <button class="filter-btn active" data-filter="all">
                            <i class="fas fa-th"></i> All Shirts
                        </button>
                        <button class="filter-btn" data-filter="Adidas">
                            <i class="fas fa-filter"></i> Adidas
                        </button>
                        <button class="filter-btn" data-filter="Nike">
                            <i class="fas fa-filter"></i> Nike
                        </button>
                        <button class="filter-btn" data-filter="Puma">
                            <i class="fas fa-filter"></i> Puma
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <main class="gallery-section">
        <div class="container">
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="loading-text">Loading shirts collection...</p>
            </div>
            <div class="row g-4" id="shirtsContainer">
            
            </div>
        </div>
    </main>

    
    <footer class="footer-section">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="footer-title">Football Shirts Gallery</h5>
                    <p class="footer-text">Premium football jerseys collection from the world's best clubs.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="social-links">
                        <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
                    </div>
                    <p class="footer-copyright">&copy; 2024 Football Shirts Gallery. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    
    <script src="app.js"></script>
</body>
</html>
